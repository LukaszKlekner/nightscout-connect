 name: Sync CareLink to Nightscout
 
 on:
   schedule:
     - cron: '*/5 * * * *'
   workflow_dispatch:
 
 jobs:
   sync:
     runs-on: ubuntu-latest
     timeout-minutes: 5
     steps:
       - uses: actions/checkout@v4
       
       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: '20'
           
       - name: Install dependencies
         run: npm install
         
       - name: Run sync
         env:
           LINK_UP_REGION: ${{ secrets.LINK_UP_REGION }}
           LINK_UP_USERNAME: ${{ secrets.LINK_UP_USERNAME }}
           LINK_UP_PASSWORD: ${{ secrets.LINK_UP_PASSWORD }}
           NIGHTSCOUT_URL: ${{ secrets.NIGHTSCOUT_URL }}
           NIGHTSCOUT_API_SECRET: ${{ secrets.NIGHTSCOUT_API_SECRET }}
         run: npx ts-node src/index.ts
