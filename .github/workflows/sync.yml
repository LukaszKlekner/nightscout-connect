 name: Sync CareLink to Nightscout
 
 on:
   schedule:
     - cron: '*/5 * * * *'
   workflow_dispatch:
 
 jobs:
   sync:
     runs-on: ubuntu-latest
     timeout-minutes: 5
     steps:
       - uses: actions/checkout@v4
       
       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: '20'
           
       - name: Install dependencies
         run: npm install
         
       - name: Run sync
         env:
           CONNECT_SOURCE: linkup
           CONNECT_LINK_UP_REGION: ${{ secrets.CONNECT_LINK_UP_REGION }}
           CONNECT_LINK_UP_USERNAME: ${{ secrets.CONNECT_LINK_UP_USERNAME }}
           CONNECT_LINK_UP_PASSWORD: ${{ secrets.CONNECT_LINK_UP_PASSWORD }}
           CONNECT_NIGHTSCOUT_ENDPOINT: ${{ secrets.CONNECT_NIGHTSCOUT_ENDPOINT }}
           CONNECT_API_SECRET: ${{ secrets.CONNECT_API_SECRET }}
         run: timeout 60s node bin/nightscout-connect forever linkup || true
