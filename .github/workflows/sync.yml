 name: Sync CareLink to Nightscout
 
 on:
   schedule:
     - cron: '*/5 * * * *'
   workflow_dispatch:
 
 jobs:
   sync:
     runs-on: ubuntu-latest
     timeout-minutes: 5
     steps:
       - uses: actions/checkout@v4
       
       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: '20'
           
       - name: Install dependencies
         run: npm install
         
       - name: Run sync
         env:
           CONNECT_SOURCE: minimedcarelink
           CONNECT_COUNTRY_CODE: ${{ secrets.CONNECT_COUNTRY_CODE }}
           CONNECT_CARELINK_REGION: ${{ secrets.CONNECT_CARELINK_REGION }}
           CONNECT_CARELINK_USERNAME: ${{ secrets.CONNECT_CARELINK_USERNAME }}
           CONNECT_CARELINK_PASSWORD: ${{ secrets.CONNECT_CARELINK_PASSWORD }}
           CONNECT_NIGHTSCOUT_ENDPOINT: ${{ secrets.CONNECT_NIGHTSCOUT_ENDPOINT }}
           CONNECT_API_SECRET: ${{ secrets.CONNECT_API_SECRET }}
         run: timeout 90s node bin/nightscout-connect forever minimedcarelink || true
